{% extends "base_dashboard.html" %}
{% block title %}Nuevo Reporte - Guardian Zero{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
{% endblock %}

{% block content %}
<div class="reporte-container">

  <div class="reporte-card">

    <h2 class="section-title">Nuevo Reporte de incidente</h2>

    <!-- 🔥 CORRECCIÓN AQUÍ -->
    <form method="POST" action="{{ url_for('dashboard.reporte_nuevo') }}" enctype="multipart/form-data">

      <!-- TOP -->
      <div class="form-top-row">

        <!-- IZQUIERDA -->
        <div class="form-fields">
          <input type="text" name="lugar" placeholder="Lugar / Título del incidente" class="form-input" required>

          <select name="tipo_incidente" class="form-input" required>
            <option disabled selected>Tipo de incidente</option>
            <option value="Sismo">Sismo</option>
            <option value="Inundacion">Inundación</option>
            <option value="Incendio">Incendio</option>
            <option value="Accidente">Accidente vehicular</option>
            <option value="Derrumbe">Derrumbe</option>
            <option value="Otro">Otro</option>
          </select>

          <input type="text" name="direccion" placeholder="Dirección / Punto de referencia" class="form-input">

          <!-- 🔥 IMPORTANTE: VALUE correcto -->
          <select name="prioridad" class="form-input">
            <option value="Media" selected>Prioridad: Media</option>
            <option value="Baja">Prioridad: Baja</option>
            <option value="Alta">Prioridad: Alta</option>
            <option value="Critica">Prioridad: Crítica</option>
          </select>
        </div>

        <!-- DERECHA -->
        <div class="form-desc">
          <textarea name="descripcion" placeholder="Descripción detallada" required></textarea>
        </div>

      </div>

      <!-- BOTTOM -->
      <div class="form-bottom-row">

        <!-- GEO -->
        <div class="geo-card">

          <div class="geo-header">
            <h3>Geolocalización y Ubicación</h3>
            <span id="gps-status" class="gps-badge gps-off">GPS DESACTIVADO</span>
          </div>

          <div class="geo-body">

            <div id="mapa-reporte" class="map-placeholder"></div>

            <div class="geo-info">
              <p id="gps-coords">[Nombre del GPS / Dirección]</p>

              <button type="button" id="btn-gps" onclick="activarGPS()">
                Activar GPS
              </button>

              <input type="hidden" name="latitud" id="latitud">
              <input type="hidden" name="longitud" id="longitud">
            </div>

          </div>
        </div>

        <!-- MEDIA -->
        <div class="media-card">

          <h3>Evidencia Multimedia</h3>

          <div class="media-icons">
            <label>
              📷
              <input type="file" name="foto" accept="image/*" hidden onchange="previewMedia(this,'foto')">
            </label>

            <label>
              🎥
              <input type="file" name="video" accept="video/*" hidden onchange="previewMedia(this,'video')">
            </label>

            <label>
              🎙️
              <input type="file" name="audio" accept="audio/*" hidden onchange="previewMedia(this,'audio')">
            </label>
          </div>

          <div id="media-preview" class="media-preview"></div>

        </div>

      </div>

      <!-- BOTON -->
      <div class="submit-wrapper">
        <button type="submit" class="btn-enviar">Enviar reporte</button>
      </div>

    </form>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Inicializar mapa centrado en México
  var mapa = L.map('mapa-reporte', { zoomControl: false, dragging: false, scrollWheelZoom: false })
               .setView([23.6345, -102.5528], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(mapa);
  var marcador = null;

function activarGPS() {
  const badge  = document.getElementById('gps-status');
  const coords = document.getElementById('gps-coords');
  const btn    = document.getElementById('btn-gps');

  if (!navigator.geolocation) {
    alert("GPS no disponible en este navegador.");
    return;
  }

  btn.textContent = "Obteniendo ubicación...";
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);

    document.getElementById('latitud').value  = lat;
    document.getElementById('longitud').value = lng;

    coords.textContent   = `Lat: ${lat}, Lng: ${lng}`;
    badge.textContent    = "GPS ACTIVADO";
    badge.className      = "gps-badge gps-on";
    btn.textContent      = "✓ Ubicación capturada";
    btn.disabled         = false;

    // Habilitar interacción y centrar mapa en la ubicación real
    mapa.dragging.enable();
    mapa.scrollWheelZoom.enable();
    mapa.setView([lat, lng], 15);

    if (marcador) mapa.removeLayer(marcador);
    marcador = L.marker([lat, lng]).addTo(mapa)
                .bindPopup("Tu ubicación").openPopup();
  }, () => {
    alert("No se pudo obtener la ubicación. Verifica los permisos de GPS.");
    btn.textContent = "Activar GPS";
    btn.disabled = false;
  });
}

function previewMedia(input, tipo) {
  const preview = document.getElementById('media-preview');
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let el = "";
    if (tipo === "foto")  el = `<img src="${e.target.result}">`;
    if (tipo === "video") el = `<video src="${e.target.result}" controls></video>`;
    if (tipo === "audio") el = `<audio src="${e.target.result}" controls></audio>`;
    preview.innerHTML += el;
  };
  reader.readAsDataURL(file);
}
</script>

<style>

/* CONTENEDOR */
.reporte-container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* CARD PRINCIPAL */
.reporte-card {
  width: 100%;
  max-width: 820px;
  background: #e3edf1;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}

/* TITULO */
.section-title {
  text-align: center;
  font-size: 1.2rem;
  color: #1a6b73;
  margin-bottom: 20px;
}

/* GRID */
.form-top-row {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 18px;
}

/* INPUTS */
.form-fields {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.form-input {
  background: #fff;
  border: none;
  border-radius: 14px;
  padding: 10px 14px;
  font-size: 0.85rem;
  box-shadow: 0 3px 6px rgba(0,0,0,.2);
}

/* TEXTAREA */
.form-desc textarea {
  width: 100%;
  height: 140px;
  border-radius: 14px;
  border: none;
  padding: 12px;
  font-size: 0.85rem;
  box-shadow: 0 3px 6px rgba(0,0,0,.2);
}

/* BOTTOM */
.form-bottom-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 18px;
  margin-top: 18px;
}

/* CARDS */
.geo-card, .media-card {
  background: #d9e4e9;
  border-radius: 10px;
  padding: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,.2);
}

/* GEO */
.geo-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.geo-header h3 {
  font-size: 0.9rem;
}

.gps-badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 20px;
}

.gps-off { background: #ccc; }
.gps-on { background: #4caf50; color: white; }

.geo-body {
  display: flex;
  gap: 12px;
}

.map-placeholder {
  width: 180px;
  height: 130px;
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 0;
}

.geo-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  font-size: 0.75rem;
}

.geo-info button {
  background: #2bbfbf;
  border: none;
  color: white;
  padding: 6px;
  border-radius: 8px;
  font-size: 0.75rem;
}

/* MEDIA */
.media-card h3 {
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.media-icons {
  display: flex;
  justify-content: space-around;
  font-size: 26px;
}

.media-icons label {
  cursor: pointer;
  transition: .2s;
}

.media-icons label:hover {
  transform: scale(1.15);
}

.media-preview img,
.media-preview video {
  width: 70px;
  border-radius: 6px;
}

/* BOTON */
.submit-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.btn-enviar {
  background: #2bbfbf;
  border: none;
  padding: 10px 30px;
  border-radius: 8px;
  font-size: 0.9rem;
  color: white;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .form-top-row,
  .form-bottom-row {
    grid-template-columns: 1fr;
  }
}

</style>

{% endblock %}
